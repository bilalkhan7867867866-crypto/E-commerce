{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">
    Products
</h2>

<div class="row">

{% for product in products %}

<div class="col-md-3 mb-4">

<div class="card">

<img
src="{{ product.image.url }}"
class="card-img-top"
height="200"
>

<div class="card-body">

<h5>
{{ product.name }}
</h5>

<p>
₹ {{ product.price }}
</p>

<a
href="{% url 'product_detail' product.slug %}"
class="btn btn-primary"
>
View
</a>

</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
