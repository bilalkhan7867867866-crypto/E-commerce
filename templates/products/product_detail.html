{% extends 'base.html' %}

{% block content %}

<div class="row">

<div class="col-md-6">

<img
src="{{ product.image.url }}"
class="img-fluid"
height="150"
>

</div>

<div class="col-md-6">

<h2>
{{ product.name }}
</h2>

<h4>
₹ {{ product.price }}
</h4>

<p>
{{ product.description }}
</p>

<p>
Stock:
{{ product.stock }}
</p>

<a
href="{% url 'add_to_cart' product.id %}"
class="btn btn-success"
>
Add To Cart
</a>

<a
href="{% url 'add_to_wishlist' product.id %}"
class="btn btn-outline-danger"
>
❤Add to Wishlist
</a>
</div>

</div>

{% endblock %}
