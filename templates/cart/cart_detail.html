{% extends 'base.html' %}

{% block content %}

<h2>Your Cart</h2>

<table class="table">

<thead>

<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for item in items %}

<tr>

<td>
{{ item.product.name }}
</td>

<td>
₹{{ item.product.price }}
</td>

<td>

<a
href="{% url 'decrease_quantity' item.id %}"
class="btn btn-warning btn-sm"
>
-
</a>

{{ item.quantity }}

<a
href="{% url 'increase_quantity' item.id %}"
class="btn btn-success btn-sm"
>
+
</a>

</td>

<td>
₹{{ item.total_price }}
</td>

<td>

<a
href="{% url 'remove_item' item.id %}"
class="btn btn-danger btn-sm"
>
Remove
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

<h3>
Grand Total: ₹{{ total }}
</h3>

<a href="{% url 'checkout' %}" class="btn btn-primary"> 
Proceed to checkout
</a>

{% endblock %}
