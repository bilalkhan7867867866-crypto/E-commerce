{% extends 'base.html' %}

{% block content %}

<h2>Checkout</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <h4>Total: ₹{{ total }}</h4>

    <button
        class="btn btn-success"
        type="submit"
    >
        Continue To Payment
    </button>

</form>

{% endblock %}
